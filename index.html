  <script>
    window.RUN_ENV = 'prod';
    window.IS_INTERNATIONAL_EDITION = 'false';
    window.PRODUCT_FEATURES = '{"billing":"true"}';
    window.__toCdnUrl = (url) => {
      const BASE_URL = '//acc-1258344699.cos.accelerate.myqcloud.com/web/agents/d45dcc7bc1ee99f363106b611ab8d0d4196d8a9e';
      return (/__.*?__$/.test(BASE_URL) ? '' : BASE_URL) + '/' + url;
    };

    // 检查是否需要显示骨架屏
    (function() {
      const host = location.host;
      const pathname = location.pathname;
      const searchParams = new URLSearchParams(location.search);
      const hasSessionId = searchParams.has('sessionId');

      // 只在 vscode-app 环境或 /agents 路径下显示骨架屏
      // 支持格式: /agents, /agents/, /agents/task/2018542616813531136
      const isAgentsTaskPath = /^\/agents\/task\/\d+$/.test(pathname);
      const shouldShowSkeleton =  pathname === '/agents' ||
                                  pathname === '/agents/' ||
                                  isAgentsTaskPath;
      window.__shouldShowSkeleton = shouldShowSkeleton;
      window.__hasSessionId = hasSessionId;
      // 默认登录状态为未知（null），等待接口返回
      window.__isLoggedIn = null;

      // 如果不需要显示骨架屏，直接返回
      if (!shouldShowSkeleton) {
        return;
      }

      // 初始化骨架屏主题 - 立即执行，在 DOM 渲染前确定主题
      // 与 agent-ui/src/utils/theme.ts 中的 getInitialTheme() 保持一致
      const THEME_STORAGE_KEY = 'agent-ui-theme';
      let isLight = false;

      try {
        // 1. 优先从 localStorage 读取用户保存的主题
        const stored = localStorage.getItem(THEME_STORAGE_KEY);
        if (stored) {
          const config = JSON.parse(stored);
          if (config.followSystem) {
            // 跟随系统
            isLight = !window.matchMedia('(prefers-color-scheme: light)').matches;
          } else {
            isLight = config.theme === 'light';
          }
        } else {
          // 2. 没有保存的主题，默认 light（与 agent-ui ThemeManager 默认主题 IDE Light 保持一致）
          isLight = true;
        }
      } catch (e) {
        // 出错时默认 dark
        isLight = true;
      }

      // 保存主题状态到全局变量，供后续使用
      window.__skeletonTheme = isLight ? 'light' : 'dark';

      // 立即设置 HTML 背景色，防止闪烁
      // 与 default-light.scss 的 --vscode-editor-background 保持一致
      document.documentElement.style.backgroundColor = isLight ? '#ffffff' : '#181818';
    })();
  </script>

  <!-- 立即应用骨架屏主题和显示状态（同步脚本，确保在渲染前执行） -->
  <script>
    (function() {
      const skeleton = document.getElementById('app-skeleton');
      if (!skeleton) return;

      // 检查是否需要显示骨架屏
      if (window.__shouldShowSkeleton) {
        skeleton.classList.add('show');
        // 添加 loading 状态 - 请求期间只显示背景色
        skeleton.classList.add('loading');
        // 应用主题
        if (window.__skeletonTheme === 'light') {
          skeleton.classList.add('light');
        }

        // 调用 accounts 接口检查登录状态
        checkLoginStatus();
      }

      // 检查登录状态
      function checkLoginStatus() {
        // 构建 API URL - 使用相对路径，让浏览器自动处理域名
        const apiUrl = '/console/accounts';

        fetch(apiUrl, {
          method: 'GET',
          credentials: 'include', // 携带 cookie
          headers: {
            'Accept': 'application/json',
          },
        })
        .then(function(response) {
          if (!response.ok) {
            // 非 200 响应视为未登录
            return null;
          }
          return response.json();
        })
        .then(function(data) {
          // 判断登录状态
          // 根据返回数据判断是否已登录（假设有 data 且有 id/userId 等字段表示已登录）
          // 统一使用 true/false，避免 0/undefined 等边界情况
          const isLoggedIn = !!(data?.data?.accounts?.length);
          window.__isLoggedIn = isLoggedIn;

          // 移除 loading 状态，显示对应骨架屏
          skeleton.classList.remove('loading');

          if (!isLoggedIn) {
            // 未登录：显示 welcome-only 视图
            skeleton.classList.add('not-logged-in');
          }
          // 已登录：保持默认的侧边栏 + 空白区域
        })
        .catch(function(error) {
          console.warn('[Skeleton] Failed to check login status:', error);
          // 请求失败时，移除 loading 状态
          skeleton.classList.remove('loading');
          window.__isLoggedIn = false;
          // 出错也显示未登录视图，因为很可能是未登录导致的
          skeleton.classList.add('not-logged-in');
        });
      }
    })();
  </script>


  <!-- 骨架屏淡出脚本 -->
  <script>
    // 平滑隐藏骨架屏（当整个应用渲染完成时触发）
    const hideSkeleton = (delay = 0) => {
      const skeleton = document.getElementById('app-skeleton');

      if (skeleton && !skeleton.classList.contains('hidden')) {
        const doHide = () => {
          // 添加 hidden 类触发淡出动画
          skeleton.classList.add('hidden');

          // 动画结束后移除 DOM
          skeleton.addEventListener('animationend', () => {
            skeleton.remove();
          }, { once: true });

          // 备用：如果 animationend 没触发，400ms 后强制移除
          setTimeout(() => {
            if (skeleton.parentNode) {
              skeleton.remove();
            }
          }, 400);
        };

        if (delay > 0) {
          // 使用 requestAnimationFrame 确保在下一帧执行，让真实UI先渲染
          requestAnimationFrame(() => {
            setTimeout(doHide, delay);
          });
        } else {
          // 即使无延迟，也使用 requestAnimationFrame 确保真实UI已渲染
          requestAnimationFrame(() => {
            requestAnimationFrame(doHide);
          });
        }
      }
    };

    // 监听应用就绪事件 - 添加短暂延迟确保侧边栏完全渲染
    window.addEventListener('app-ready', () => hideSkeleton(50));

    // 备用 - 如果 10 秒后还没触发，自动隐藏
    setTimeout(() => {
      const skeleton = document.getElementById('app-skeleton');
      if (skeleton && !skeleton.classList.contains('hidden')) {
        hideSkeleton(0);
      }
    }, 1000 * 20);
  </script>
</body>
